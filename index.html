<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min FIRE Kalkylator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        h2 { color: #1abc9c; font-size: 1.2em; border-bottom: 2px solid #eee; padding-bottom: 5px; margin-top: 25px; }
        
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 10px;
        }
        .input-group { margin-bottom: 10px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9em; }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .result-box {
            background-color: #e8f8f5;
            border-left: 5px solid #1abc9c;
            padding: 15px;
            margin: 20px 0;
            font-size: 1.1em;
            line-height: 1.6;
        }
        .tax-warning {
            color: #c0392b;
            font-size: 0.9em;
            margin-top: 5px;
            font-weight: bold;
        }
        .chart-container {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        h3 { color: #2c3e50; margin-bottom: 10px; text-align: center; }
        
        @media (max-width: 600px) {
            .input-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔥 Min FIRE Kalkylator 🔥</h1>

    <h2>Grunduppgifter</h2>
    <div class="input-grid">
        <div class="input-group">
            <label for="capital">Nuvarande sparkapital (kr):</label>
            <input type="number" id="capital" value="5000000" oninput="calculateFIRE()">
        </div>
        <div class="input-group">
            <label for="withdrawalRate">Uttagsnivå från start (%):</label>
            <input type="number" id="withdrawalRate" value="4" step="0.1" oninput="calculateFIRE()">
        </div>
        <div class="input-group">
            <label for="returnRate">Förväntad årlig avkastning (%):</label>
            <input type="number" id="returnRate" value="7" step="0.1" oninput="calculateFIRE()">
        </div>
        <div class="input-group">
            <label for="years">Tidshorisont (år):</label>
            <input type="number" id="years" value="30" oninput="calculateFIRE()">
        </div>
        <div class="input-group">
            <label for="inflationRate">Årlig inflation (%):</label>
            <input type="number" id="inflationRate" value="2" step="0.1" oninput="calculateFIRE()">
        </div>
        <div class="input-group">
            <label for="iskRate">Schablonskatt ISK (%):</label>
            <input type="number" id="iskRate" value="1.08" step="0.01" oninput="calculateFIRE()">
        </div>
    </div>

    <h2>Sparande & Engångshändelser</h2>
    <div class="input-grid">
        <div class="input-group">
            <label for="monthlySavings">Månatligt nysparande (kr):</label>
            <input type="number" id="monthlySavings" value="0" oninput="calculateFIRE()">
        </div>
        <div></div> 
        
        <div class="input-group">
            <label for="lumpSumIn">Engångsinsättning (t.ex. husförsäljning):</label>
            <input type="number" id="lumpSumIn" value="0" placeholder="Belopp i kr" oninput="calculateFIRE()">
        </div>
        <div class="input-group">
            <label for="lumpSumInYear">Vilket år sker insättningen? (1-30):</label>
            <input type="number" id="lumpSumInYear" value="0" placeholder="År" oninput="calculateFIRE()">
        </div>

        <div class="input-group">
            <label for="lumpSumOut">Större engångsuttag (t.ex. båtköp):</label>
            <input type="number" id="lumpSumOut" value="0" placeholder="Belopp i kr" oninput="calculateFIRE()">
        </div>
        <div class="input-group">
            <label for="lumpSumOutYear">Vilket år sker uttaget? (1-30):</label>
            <input type="number" id="lumpSumOutYear" value="0" placeholder="År" oninput="calculateFIRE()">
        </div>
    </div>

    <div class="result-box">
        <div>Din start-månadslön (skattefritt in på kontot): <strong id="monthlySalary">0 kr</strong></div>
        <div class="tax-warning">Årlig ISK-skatt (År 1): <span id="iskTaxDisplay">0 kr</span></div>
    </div>

    <div class="chart-container">
        <h3>Kapitalets utveckling</h3>
        <canvas id="capitalChart" width="400" height="200"></canvas>
    </div>

    <div class="chart-container">
        <h3>Löpande månadsuttag (justerat för inflation)</h3>
        <canvas id="withdrawalChart" width="400" height="200"></canvas>
    </div>
</div>

<script>
    let capitalChartInstance = null;
    let withdrawalChartInstance = null;

    function calculateFIRE() {
        // Hämta grunduppgifter
        const initialCapital = parseFloat(document.getElementById('capital').value) || 0;
        const withdrawalRate = parseFloat(document.getElementById('withdrawalRate').value) / 100 || 0;
        const returnRate = parseFloat(document.getElementById('returnRate').value) / 100 || 0;
        const years = parseInt(document.getElementById('years').value) || 0;
        const inflationRate = parseFloat(document.getElementById('inflationRate').value) / 100 || 0;
        const iskRate = parseFloat(document.getElementById('iskRate').value) / 100 || 0;

        // Hämta sparande och engångshändelser (använder || 0 ifall fältet är tomt)
        const monthlySavings = parseFloat(document.getElementById('monthlySavings').value) || 0;
        const lumpSumIn = parseFloat(document.getElementById('lumpSumIn').value) || 0;
        const lumpSumInYear = parseInt(document.getElementById('lumpSumInYear').value) || 0;
        const lumpSumOut = parseFloat(document.getElementById('lumpSumOut').value) || 0;
        const lumpSumOutYear = parseInt(document.getElementById('lumpSumOutYear').value) || 0;

        if (years <= 0) return;

        // Beräkna initiala värden
        const initialYearlyWithdrawal = initialCapital * withdrawalRate;
        const monthlySalary = initialYearlyWithdrawal / 12;
        const firstYearIskTax = initialCapital * iskRate;
        
        document.getElementById('monthlySalary').innerText = Math.round(monthlySalary).toLocaleString("sv-SE") + " kr";
        document.getElementById('iskTaxDisplay').innerText = Math.round(firstYearIskTax).toLocaleString("sv-SE") + " kr/år";

        let currentCapital = initialCapital;
        
        let capitalHistory = [initialCapital];
        let withdrawalHistory = [monthlySalary]; 
        let labels = ["År 0"];

        for (let i = 1; i <= years; i++) {
            let yearlyIskTax = currentCapital * iskRate;

            // Beräkna årets inflationsjusterade löpande uttag
            let adjustedYearlyWithdrawal = initialYearlyWithdrawal * Math.pow((1 + inflationRate), i);
            let adjustedMonthlyWithdrawal = adjustedYearlyWithdrawal / 12;

            let yearlyReturn = currentCapital * returnRate;
            let yearlySavings = monthlySavings * 12; // Månatligt sparande blir årligt
            
            // Kolla om vi ska lägga till/dra av engångssummor just detta år
            let extraInThisYear = (i === lumpSumInYear) ? lumpSumIn : 0;
            let extraOutThisYear = (i === lumpSumOutYear) ? lumpSumOut : 0;

            // Sammanställ det nya kapitalet
            currentCapital = currentCapital + yearlyReturn + yearlySavings + extraInThisYear - extraOutThisYear - adjustedYearlyWithdrawal - yearlyIskTax;
            
            if (currentCapital < 0) currentCapital = 0; 

            capitalHistory.push(currentCapital);
            withdrawalHistory.push(adjustedMonthlyWithdrawal); // Visar enbart det löpande uttaget i grafen
            labels.push("År " + i);
        }

        updateCapitalChart(labels, capitalHistory);
        updateWithdrawalChart(labels, withdrawalHistory);
    }

    function updateCapitalChart(labels, data) {
        const ctx = document.getElementById('capitalChart').getContext('2d');
        if (capitalChartInstance) capitalChartInstance.destroy();

        capitalChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Sparkapital (kr)',
                    data: data,
                    borderColor: '#1abc9c',
                    backgroundColor: 'rgba(26, 188, 156, 0.2)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { callback: value => value.toLocaleString("sv-SE") + ' kr' }
                    }
                }
            }
        });
    }

    function updateWithdrawalChart(labels, data) {
        const ctx = document.getElementById('withdrawalChart').getContext('2d');
        if (withdrawalChartInstance) withdrawalChartInstance.destroy();

        withdrawalChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Löpande månadsuttag (kr)',
                    data: data,
                    borderColor: '#e67e22',
                    backgroundColor: 'rgba(230, 126, 34, 0.2)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { callback: value => value.toLocaleString("sv-SE") + ' kr' }
                    }
                }
            }
        });
    }

    window.onload = calculateFIRE;
</script>

</body>
</html>
